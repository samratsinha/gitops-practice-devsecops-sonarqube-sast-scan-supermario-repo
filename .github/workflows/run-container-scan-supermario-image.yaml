name: Run Container Scan on Super Mario Docker Image with Quality Gate

#on:
#  push:
#    branches:
#      - main

jobs:
  container_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ✅ Step 1: Set VERSION correctly from version.txt
      - name: Set VERSION
        run: |
          VERSION=$(($(cat version.txt) + 1))
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Using VERSION=$VERSION"

      # ✅ Step 2: Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      # ✅ Step 3: Pull the image
      - name: Pull Docker Image
        run: |
          docker pull samratsinha05/supermariogitopsproject:${{ env.VERSION }}
          docker images

      # ✅ Step 4: Run Trivy Scan (Quality Gate Enabled)
      - name: Run Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: samratsinha05/supermariogitopsproject:${{ env.VERSION }}
          format: table
          exit-code: '1'              # ❗ Fail pipeline if vulnerabilities found
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          scanners: vuln              # ⚡ Faster scan (skip secrets)