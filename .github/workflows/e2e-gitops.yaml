name: Run SAST, Build, Push, Scan and Update Deployment

on:
  push:
    branches:
      - main

jobs:

  # -----------------------------
  # 1. SonarQube SAST Scan
  # -----------------------------
  sonarqube_sast_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # -----------------------------
  # 2. Build & Push Docker Image
  # -----------------------------
  build_push_supermario_docker_image:
    runs-on: ubuntu-latest
    needs: sonarqube_sast_scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ✅ Fix VERSION handling
      - name: Set VERSION
        run: echo "VERSION=$(($(cat version.txt)+1))" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t docker.io/samratsinha05/supermariogitopsproject:${{ env.VERSION }} .

      - name: Push Docker Image
        run: |
          docker push docker.io/samratsinha05/supermariogitopsproject:${{ env.VERSION }}

  # -----------------------------
  # 3. Trivy Image Scan
  # -----------------------------
  run_container_image_scan_on_supermario_docker_image:
    runs-on: ubuntu-latest
    needs: build_push_supermario_docker_image

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Ensure same VERSION again (jobs are isolated!)
      - name: Set VERSION
        run: echo "VERSION=$(($(cat version.txt)+1))" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull Image
        run: docker pull docker.io/samratsinha05/supermariogitopsproject:${{ env.VERSION }}

      # ✅ FIX: Direct scan (no tarball)
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: docker.io/samratsinha05/supermariogitopsproject:${{ env.VERSION }}
          format: table
          exit-code: '0'   # change to '1' to fail pipeline on vulnerabilities
          severity: CRITICAL,HIGH

  # -----------------------------
  # 4. Update K8s Deployment
  # -----------------------------
  update_k8s_yaml_version_file_with_latest_image_tag:
    runs-on: ubuntu-latest
    needs: run_container_image_scan_on_supermario_docker_image

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set VERSION
        run: echo "VERSION=$(($(cat version.txt)+1))" >> $GITHUB_ENV

      - name: Set Git Config
        run: |
          git config --global user.email "${{ secrets.GIT_EMAIL }}"
          git config --global user.name "${{ secrets.GIT_USERNAME }}"

      - name: Update Deployment YAML and version.txt
        run: |
          sed -i "s|image: samratsinha05/supermariogitopsproject:.*$|image: samratsinha05/supermariogitopsproject:${{ env.VERSION }}|" deployment.yaml
          echo "${{ env.VERSION }}" > version.txt

      - name: Commit and Push Changes
        run: |
          git add deployment.yaml version.txt
          git commit -m "Updated image tag to version ${{ env.VERSION }}"
          git push